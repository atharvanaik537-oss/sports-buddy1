<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Registration | Sports Buddy</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="admin-auth-page">
    <div class="login-container">
        <h2>Admin Registration</h2>
        <p>Create a new administrative account.</p>
        <form id="adminRegForm">
            <input type="email" id="adminEmail" placeholder="Admin Email" required>
            <input type="password" id="adminPass" placeholder="Secret Password" required minlength="8">
            <button type="submit" class="btn-primary">Register Admin</button>
        </form>
        <p><a href="admin-login.html">Back to Admin Login</a></p>
    </div>

    <script type="module">
        import { registerUser } from './src/auth.js';
        import { logAction } from './src/logger.js';

        document.getElementById('adminRegForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('adminEmail').value;
            const pass = document.getElementById('adminPass').value;

            // Mandatory Logging
            logAction('Admin Registration Attempt', 'Attempted', { email: email });
            
            // Reusing the modular auth logic
            await registerUser(email, pass);
            alert("Admin Registered! Use these credentials at the Admin Login.");
        });
    </script>
</body>
</html>
