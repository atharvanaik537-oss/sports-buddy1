<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports Buddy | Connect & Play</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <header class="hero">
        <h1>Find Your Sports Buddy</h1>
        <p>Grow your network and meet locals while traveling.</p>
        
        <div class="auth-box">
            <h3>Welcome Back</h3>
            <p>Login to find your next match</p>
            
            <form id="loginForm"> 
                <input type="email" id="loginEmail" placeholder="Email" required>
                <input type="password" id="loginPass" placeholder="Password" required>
                <button type="submit" class="btn-primary">Login</button>
            </form>
            
            <hr>
            <p>New to Sports Buddy? <a href="register.html">Create an Account</a></p>
            
            <div style="margin-top: 20px; font-size: 0.9em; border-top: 1px solid #eee; padding-top: 10px;">
                <p><strong>Admin Access:</strong></p>
                <a href="admin-login.html" style="color: #007bff; text-decoration: underline;">Admin Login</a> 
                <span style="margin: 0 10px;">|</span>
                <a href="admin-register.html" style="color: #007bff; text-decoration: underline;">Register Admin Account</a>
            </div>
        </div>
    </header>

    <script type="module">
        // 1. Import necessary Firebase tools
        import { auth, db } from './src/firebase-config.js';
        import { signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";
        import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";
        import { logAction } from './src/logger.js';

        const loginForm = document.getElementById('loginForm');

        if (!loginForm) {
            console.error("CRITICAL ERROR: Could not find loginForm");
        } else {
            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const email = document.getElementById('loginEmail').value;
                const pass = document.getElementById('loginPass').value;

                try {
                    logAction('User Login Attempt', 'Attempted', { email: email });

                    // A. Attempt to sign in with Firebase Auth
                    const userCredential = await signInWithEmailAndPassword(auth, email, pass);
                    const user = userCredential.user;

                    // B. IMMEDIATELY check the Firestore Database
                    const userRef = doc(db, "users", user.uid);
                    const userSnap = await getDoc(userRef);

                    if (!userSnap.exists()) {
                        // USER IS DELETED FROM DATABASE - Stop them here!
                        await signOut(auth);
                        alert("Error: This account has been deactivated or removed from the database.");
                        return; 
                    }

                    // C. If they exist, check their role and redirect
                    const userData = userSnap.data();
                    alert("Login Successful!");

                    if (userData.role === 'admin') {
                        window.location.href = 'admin-dashboard.html';
                    } else {
                        window.location.href = 'user-dashboard.html';
                    }

                } catch (err) {
                    console.error("Login Error:", err);
                    alert("Login Failed: " + err.message);
                }
            });
        }
    </script>
</body>
</html>
