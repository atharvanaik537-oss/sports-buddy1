<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Sports Buddy</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="admin-auth-page">
    <div class="login-container">
        <h2>Sports Buddy Admin</h2> 
        <p>Enter credentials to manage the platform</p>
        <form id="adminLoginForm">
            <input type="email" id="email" placeholder="Admin Email" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit" class="btn-primary">Login to Dashboard</button>
        </form>
    </div>

    <script type="module">
        import { logAction } from './src/logger.js';
        import { loginUser } from './src/auth.js';
        
        document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Fulfilling mandatory logging requirement
            logAction('Admin Login Attempt', 'Attempted', { email: email }); 
            
            // Using the auth logic we created earlier
            await loginUser(email, password, 'admin-dashboard.html');
        });
    </script>
</body>
</html>
